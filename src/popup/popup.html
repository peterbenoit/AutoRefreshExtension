<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AutoRefresh</h1>
            <label class="switch">
                <input type="checkbox" id="toggleSwitch">
                <span class="slider round"></span>
            </label>
        </header>

        <section class="config-section">
            <div class="time-inputs">
                <div class="input-group">
                    <label for="minutes">Minutes</label>
                    <input type="number" id="minutes" min="0" max="1440" value="0">
                </div>
                <div class="input-group">
                    <label for="seconds">Seconds</label>
                    <input type="number" id="seconds" min="0" max="59" value="10">
                </div>
            </div>

            <div class="options">
                <label class="checkbox-container">
                    Randomize interval (±20%)
                    <input type="checkbox" id="randomize">
                    <span class="checkmark"></span>
                </label>
                <label class="checkbox-container">
                    Hard Reload (Bypass Cache)
                    <input type="checkbox" id="hardReload">
                    <span class="checkmark"></span>
                </label>
                <label class="checkbox-container">
                    Pause while active
                    <input type="checkbox" id="pauseWhileActive" checked>
                    <span class="checkmark"></span>
                </label>
            </div>
            
            <div id="statusMessage" class="status-msg hidden">
                 Tab will refresh in <span id="countdown">--</span>s
            </div>
        </section>
    </div>
    <script src="popup.js"></script>
</body>
</html>
